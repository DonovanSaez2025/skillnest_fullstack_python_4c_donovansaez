<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="donovansaez@liceovvh.cl">
    <link rel="stylesheet" href="static/css/style.css">
    <title>Inicio sesión</title>
</head>

<body>
    <div class="contenedor">
        <div class="row">
            <div class="col">
                <h2 class="inic-title">Inicio de Sesión</h2>
                <form>
                    <div class="parte">
                        <label for="email">E-mail</label>
                        <input class="input-box" type="email" id="email">
                    </div>
                    <div class="parte">
                        <label for="pass">Contraseña</label>
                        <input class="input-box" type="password" id="pass">
                    </div>
                    <input class="boton" type="submit" value="Iniciar Sesión">
                </form>
            </div>
            <div class="col">
                <h2 class="regis-title">Registro</h2>
                <form class="regis-form">
                    <div class="parte">
                        <label for="username">Nombre</label>
                        <input class="input-box" type="text" id="username" name="username">
                    </div>
                    <div class="parte">
                        <label for="email">E-mail</label>
                        <input class="input-box" type="email" id="email" name="email">
                    </div>
                    <div class="parte">
                        <label for="pass">Contraseña</label>
                        <input class="input-box" type="password" id="pass" name="pass">
                    </div>
                    <div class="parte">
                        <label for="confpass">Conf. Contraseña</label>
                        <input class="input-box" type="password" id="confpass" name="confpass">
                    </div>
                    <input class="boton" type="submit" value="Registrar">
                </form>
            </div>
        </div>
    </div>
</body>

</html>
